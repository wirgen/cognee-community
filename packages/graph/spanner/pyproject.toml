[project]
name = "cognee-community-graph-adapter-spanner"
version = "0.1.0"
description = "Google Cloud Spanner Graph database adapter for cognee"
readme = "README.md"
requires-python = ">=3.10,<3.14"
dependencies = [
    "google-cloud-spanner>=3.49.0",
    "cognee==0.5.3",
    "starlette>=0.48.0",
    "instructor>=1.11",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
]

[project.urls]
Homepage = "https://github.com/topoteretes/cognee"
Repository = "https://github.com/topoteretes/cognee-community"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "B", "UP", "C4", "PGH", "SIM", "RUF"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
