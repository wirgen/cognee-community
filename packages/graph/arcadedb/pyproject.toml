[project]
name = "cognee-community-graph-adapter-arcadedb"
version = "0.1.0"
description = "ArcadeDB graph database adapter for cognee"
authors = [
    {name = "Luca Garulli", email = "l.garulli@arcadedata.com"},
]
dependencies = [
    "cognee[neo4j]>=0.5.2",
    "starlette>=0.48.0",
    "instructor>=1.11"
]
readme = "README.md"
requires-python = ">=3.10"

[project.urls]
Homepage = "https://github.com/topoteretes/cognee"
Repository = "https://github.com/topoteretes/cognee-community"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 100
target-version = "py39"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "B", "UP", "C4", "PGH", "SIM", "RUF"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
