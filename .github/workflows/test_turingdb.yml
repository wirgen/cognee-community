name: Test TuringDB Community Adapter

on:
  workflow_call:
    inputs:
      event-type:
        required: false
        type: string
        default: "regular-testing-event"
    secrets:
      LLM_MODEL:
        required: true
      LLM_ENDPOINT:
        required: true
      LLM_API_KEY:
        required: true
      LLM_API_VERSION:
        required: true
      EMBEDDING_MODEL:
        required: true
      EMBEDDING_ENDPOINT:
        required: true
      EMBEDDING_API_KEY:
        required: true
      EMBEDDING_API_VERSION:
        required: true
  workflow_dispatch:
  pull_request:
    branches: [ main, dev ]
    paths:
      - 'packages/graph/turingdb/**'

concurrency:
  group: turingdb-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  test-turingdb:
    name: "TuringDB Community Adapter Test"
    runs-on: ubuntu-22.04
    services:
      turingdb:
        image: turingdbai/turingdb:nightly
        ports:
          - 6666:6666
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Community Setup
        uses: ./.github/actions/community_setup
        with:
          python-version: '3.11.x'
          package-path: packages/graph/turingdb
          event-type: ${{ inputs.event-type }}

      - name: Wait for TuringDB
        run: |
          for i in {1..30}; do
            if nc -z localhost 6666; then
              echo "TuringDB is ready"
              break
            fi
            echo "Waiting for TuringDB..."
            sleep 2
          done

      - name: Run TuringDB Example
        env:
          ENV: 'dev'
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
          GRAPH_DATABASE_PROVIDER: 'turingdb'
          GRAPH_DB_URL: 'http://localhost:6666'
        working-directory: ./packages/graph/turingdb
        run: poetry run python examples/example.py

      - name: Run TuringDB Tests
        env:
          ENV: 'dev'
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
          GRAPH_DATABASE_PROVIDER: 'turingdb'
          GRAPH_DB_URL: 'http://localhost:6666'
        working-directory: ./packages/graph/turingdb
        run: poetry run python tests/test_turingdb.py
