name: Test FalkorDB Community Adapter

on:
  workflow_call:
    inputs:
      event-type:
        required: false
        type: string
        default: "regular-testing-event"
    secrets:
      LLM_MODEL:
        required: false
      LLM_ENDPOINT:
        required: false
      LLM_API_KEY:
        required: false
      LLM_API_VERSION:
        required: false
      EMBEDDING_MODEL:
        required: false
      EMBEDDING_ENDPOINT:
        required: false
      EMBEDDING_API_KEY:
        required: false
      EMBEDDING_API_VERSION:
        required: false
  workflow_dispatch:
  pull_request:
    branches: [ main, dev ]
    paths:
      - 'packages/hybrid/falkordb/**'

concurrency:
  group: falkordb-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  test-falkordb:
    name: "FalkorDB Community Adapter Test"
    runs-on: ubuntu-22.04
    services:
      falkordb:
        image: falkordb/falkordb:edge
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Community Setup
        uses: ./.github/actions/community_setup
        with:
          python-version: '3.11.x'
          package-path: packages/hybrid/falkordb
          event-type: ${{ inputs.event-type }}

      - name: Wait for FalkorDB
        run: |
          for i in {1..30}; do
            if nc -z localhost 6379; then
              echo "FalkorDB is ready"
              break
            fi
            echo "Waiting for FalkorDB..."
            sleep 2
          done

      - name: Check API keys availability
        id: check-keys
        run: |
          if [ -n "${{ secrets.LLM_API_KEY }}" ] && [ -n "${{ secrets.EMBEDDING_API_KEY }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::LLM/Embedding API keys not available — skipping LLM-dependent tests (likely a fork PR)"
          fi

      - name: Run FalkorDB Example
        if: steps.check-keys.outputs.available == 'true'
        env:
          ENV: 'dev'
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
          GRAPH_DATABASE_PROVIDER: 'falkordb'
          GRAPH_DB_URL: 'localhost'
          GRAPH_DB_PORT: '6379'
          GRAPH_DATASET_DATABASE_HANDLER: 'falkor_graph_local'
          VECTOR_DATASET_DATABASE_HANDLER: 'falkor_vector_local'
        working-directory: ./packages/hybrid/falkordb
        run: poetry run python examples/example.py

      - name: Run FalkorDB Tests
        if: steps.check-keys.outputs.available == 'true'
        env:
          ENV: 'dev'
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
          GRAPH_DATABASE_PROVIDER: 'falkordb'
          GRAPH_DB_URL: 'localhost'
          GRAPH_DB_PORT: '6379'
          GRAPH_DATASET_DATABASE_HANDLER: 'falkor_graph_local'
          VECTOR_DATASET_DATABASE_HANDLER: 'falkor_vector_local'
        working-directory: ./packages/hybrid/falkordb
        run: poetry run python tests/test_falkordb.py
